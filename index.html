<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Division 2 Codex</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--div-orange:#e8871a;--div-orange-bright:#ff9422;--div-teal:#4ef0d8;--div-surface:#111820;--div-surface2:#0d1219;--div-border:#1e2d3d;--div-border2:#2a3d52;--div-text:#c8d8e8;--div-text-dim:#5a7a90;--font-hud:'Barlow Condensed',sans-serif;--font-ui:'Rajdhani',sans-serif}
html,body{min-height:100%;background:#0a0e14;font-family:var(--font-ui);color:var(--div-text)}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-titles h1{font-family:var(--font-hud);font-size:32px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;line-height:1;text-shadow:0 0 24px rgba(232,135,26,.35)}
.topbar-titles p{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--div-text-dim);margin-top:2px}
.topbar-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.weekly-pill{font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--div-surface);border:1px solid var(--div-border2);border-radius:2px;padding:7px 14px;color:var(--div-text-dim)}
.weekly-pill b{color:var(--div-orange)}
.timer-block{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.timer-label{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--div-text-dim)}
.timer-val{font-family:var(--font-hud);font-size:38px;font-weight:800;color:var(--div-orange);font-variant-numeric:tabular-nums;letter-spacing:.04em;line-height:1;text-shadow:0 0 20px rgba(232,135,26,.6)}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--div-text-dim);margin-bottom:.875rem;padding:.5rem .875rem;background:var(--div-surface);border:1px solid var(--div-border);border-radius:2px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:#3abf5e;box-shadow:0 0 6px rgba(58,191,94,.5)}
.sync-dot.err{background:#e04040;box-shadow:0 0 6px rgba(224,64,64,.5)}
.sync-dot.loading{background:var(--div-orange);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;gap:2px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;border:1px solid var(--div-border);background:var(--div-surface);color:var(--div-text-dim);border-radius:2px;transition:all .15s}
.tab:hover{border-color:var(--div-border2);color:var(--div-text)}
.tab.on{background:var(--div-orange);border-color:var(--div-orange);color:#000}
.mission-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.mrow{background:var(--div-surface);border:1px solid var(--div-border);border-radius:3px;overflow:hidden;border-left:3px solid transparent}
.mrow.stronghold-row{border-left-color:var(--div-teal)}
.mrow.mission-row{border-left-color:#378ADD}
.mrow-inner{display:flex;align-items:stretch;min-height:64px}
.mrow-num{width:40px;display:flex;align-items:center;justify-content:center;font-family:var(--font-hud);font-size:20px;font-weight:800;flex-shrink:0;color:var(--div-text-dim);border-right:1px solid var(--div-border)}
.mrow-icon{width:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-right:1px solid var(--div-border)}
.mrow-info{flex:1;padding:.6rem .875rem;display:flex;flex-direction:column;justify-content:center;min-width:0;border-right:1px solid var(--div-border)}
.mrow-name{font-family:var(--font-hud);font-size:16px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;line-height:1;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badge-type{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;line-height:1.5}
.badge-mission{background:rgba(55,138,221,.15);color:#7ab3d4;border:1px solid rgba(55,138,221,.25)}
.badge-stronghold{background:rgba(78,240,216,.1);color:var(--div-teal);border:1px solid rgba(78,240,216,.2)}
.badge-district{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--div-text-dim);padding:2px 6px;border:1px solid var(--div-border);border-radius:2px}
.mrow-loot{flex:1.2;padding:.6rem 1rem;display:flex;flex-direction:column;justify-content:center;min-width:0}
.mrow-loot-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--div-text-dim);margin-bottom:3px}
.mrow-loot-item{font-family:var(--font-hud);font-size:18px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--div-orange-bright);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 12px rgba(232,135,26,.35)}
.mrow-loot-footer{display:flex;align-items:center;justify-content:flex-end;margin-top:5px}
.btn-edit-sm{font-family:var(--font-ui);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--div-border2);background:transparent;color:var(--div-text-dim);border-radius:2px;padding:3px 8px;cursor:pointer;transition:all .12s}
.btn-edit-sm:hover,.btn-edit-sm.active{border-color:var(--div-orange);color:var(--div-orange)}
.save-msg{font-size:10px;font-weight:700;letter-spacing:.06em;margin-top:4px;min-height:14px}
.save-msg.saving{color:var(--div-orange)}
.save-msg.saved{color:#3abf5e}
.save-msg.error{color:#e04040}
.edit-area{padding:.75rem 1rem;border-top:1px solid rgba(232,135,26,.25);background:var(--div-surface2)}
.pw-overlay h4{font-family:var(--font-hud);font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;margin-bottom:.625rem}
.pw-error{font-size:11px;color:#e04040;margin-top:4px;font-weight:600}
.erow{display:flex;flex-direction:column;gap:3px;margin-bottom:.5rem}
.erow label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--div-text-dim)}
.erow input,.erow select{font-family:var(--font-ui);font-size:13px;font-weight:600;padding:6px 10px;border:1px solid var(--div-border2);border-radius:2px;background:#0a0f16;color:var(--div-text);width:100%;letter-spacing:.03em}
.erow input:focus,.erow select:focus{outline:none;border-color:var(--div-orange)}
.btn-row{display:flex;gap:8px}
.bsave{font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--div-orange);color:#000;border:none;border-radius:2px;padding:6px 16px;cursor:pointer}
.bcancel{font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:1px solid var(--div-border2);border-radius:2px;padding:6px 12px;cursor:pointer;color:var(--div-text-dim)}
.tier-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
@media(max-width:600px){.tier-layout{grid-template-columns:1fr}}
.section-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--div-text-dim);margin-bottom:.625rem;padding-bottom:.4rem;border-bottom:1px solid var(--div-border)}
.tier-thead{display:grid;grid-template-columns:54px 90px 40px 1fr;padding:6px 10px;border-bottom:1px solid var(--div-border2)}
.tier-thead span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--div-text-dim)}
.tier-rows{display:flex;flex-direction:column;background:var(--div-surface);border:1px solid var(--div-border);border-radius:3px;overflow:hidden}
.tier-row{display:grid;grid-template-columns:54px 90px 40px 1fr;align-items:center;padding:8px 10px;border-bottom:1px solid var(--div-border);cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.tier-row:last-child{border-bottom:none}
.tier-row:hover{background:var(--div-surface2)}
.tier-row.selected{background:rgba(232,135,26,.1);border-left-color:var(--div-orange)}
.tier-row.selected .tr-badge{color:var(--div-orange)!important;border-color:rgba(232,135,26,.4)!important;background:rgba(232,135,26,.15)!important}
.tr-badge{display:inline-block;border-radius:2px;padding:2px 7px;font-size:11px;font-weight:700;letter-spacing:.06em;line-height:1.5}
.t-free{background:rgba(58,191,94,.15);color:#3abf5e;border:1px solid rgba(58,191,94,.25)}
.t-low{background:rgba(100,160,210,.12);color:#7ab3d4;border:1px solid rgba(100,160,210,.2)}
.t-mid{background:rgba(232,135,26,.12);color:var(--div-orange);border:1px solid rgba(232,135,26,.22)}
.t-hi{background:rgba(220,60,60,.12);color:#e04040;border:1px solid rgba(220,60,60,.22)}
.tr-cost{font-size:12px;font-weight:600;color:var(--div-text)}
.tr-net{font-size:13px;font-weight:700}
.gn{color:#3abf5e}.rd{color:#e04040}
.tr-drop-cell{display:flex;flex-direction:column;gap:1px}
.tr-proto{font-size:12px;font-weight:700;color:var(--div-orange);line-height:1.3}
.tr-loot{font-size:11px;font-weight:600;color:var(--div-text-dim);line-height:1.3}
.tier-row.selected .tr-loot{color:var(--div-text)}
.mut-panel{background:var(--div-surface);border:1px solid var(--div-border);border-radius:3px;padding:1rem}
.mut-panel-title{font-family:var(--font-hud);font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;line-height:1}
.mut-panel-sub{font-size:11px;color:var(--div-text-dim);font-weight:500;margin-top:3px;margin-bottom:.75rem}
.click-hint{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--div-text-dim);text-align:center;padding:.6rem;border:1px dashed var(--div-border);border-radius:2px;margin-bottom:.75rem}
.mut-section-hdr{font-family:var(--font-hud);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;margin:8px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--div-border)}
.mut-list{display:flex;flex-direction:column;gap:3px}
.mut-item{padding:.5rem .75rem;border-radius:2px;border:1px solid transparent;border-left:3px solid transparent;transition:all .2s}
.mut-item.active{border-color:rgba(232,135,26,.2);border-left-color:var(--div-orange);background:rgba(232,135,26,.06)}
.mut-item.inactive{opacity:.25}
.mut-item-name{font-family:var(--font-hud);font-size:14px;font-weight:700;letter-spacing:.06em;color:#fff;line-height:1;margin-bottom:3px}
.mut-item.inactive .mut-item-name{color:var(--div-text-dim)}
.mut-item-desc{font-size:11px;font-weight:500;color:var(--div-text-dim);line-height:1.5}
.mut-item.active .mut-item-desc{color:var(--div-text)}
.mut-item-tier{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--div-text-dim);margin-top:3px}
.mut-item.active .mut-item-tier{color:var(--div-orange)}
.bk-blue{color:#7ab3d4}
.bk-red{color:#e04040}
.bk-yellow{color:#e8c01a}
/* BRAND SETS */
.brand-search-wrap{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.brand-search{font-family:var(--font-ui);font-size:13px;font-weight:600;padding:8px 12px;border:1px solid var(--div-border2);border-radius:3px;background:var(--div-surface);color:var(--div-text);flex:1;letter-spacing:.03em}
.brand-search:focus{outline:none;border-color:var(--div-orange)}
.brand-count{font-size:11px;font-weight:600;color:var(--div-text-dim);white-space:nowrap;letter-spacing:.06em}
.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:1rem}
.brand-card{background:#1a1610;border:1px solid #3a3020;border-radius:4px;overflow:hidden;transition:border-color .15s,transform .18s}
.brand-card:hover{border-color:#5a4a30;transform:translateY(-2px)}
.brand-card-top{display:flex;align-items:center;gap:10px;padding:.75rem .875rem;border-bottom:1px solid #2e2518}
.brand-icon{width:44px;height:44px;object-fit:contain;flex-shrink:0}
.brand-icon-fallback{width:44px;height:44px;background:var(--div-surface2);border:1px solid var(--div-border2);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-hud);font-size:14px;font-weight:700;color:var(--div-text-dim)}
.brand-name{font-family:var(--font-hud);font-size:15px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;line-height:1.2}
.brand-bonuses{padding:.625rem .875rem .75rem;display:flex;flex-direction:column;gap:5px}
.brand-bonus{display:flex;align-items:flex-start;gap:8px}
.bonus-pip{width:18px;height:18px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--font-hud);font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;line-height:1}
.bonus-pip.p1{background:rgba(100,160,210,.15);color:#7ab3d4;border:1px solid rgba(100,160,210,.25)}
.bonus-pip.p2{background:rgba(232,135,26,.12);color:var(--div-orange);border:1px solid rgba(232,135,26,.22)}
.bonus-pip.p3{background:rgba(58,191,94,.12);color:#3abf5e;border:1px solid rgba(58,191,94,.22)}
.bonus-text{font-size:12px;font-weight:600;color:var(--div-text);line-height:1.45}
/* GEAR SETS */
.gearset-search-wrap{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.gearset-search{font-family:var(--font-ui);font-size:13px;font-weight:600;padding:8px 12px;border:1px solid var(--div-border2);border-radius:3px;background:var(--div-surface);color:var(--div-text);flex:1;letter-spacing:.03em}
.gearset-search:focus{outline:none;border-color:var(--div-orange)}
.gearset-count{font-size:11px;font-weight:600;color:var(--div-text-dim);white-space:nowrap;letter-spacing:.06em}
.gearset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:1rem}
/* UPDATED: Gear set card uses teal background to distinguish from brand sets */
.gearset-card{background:rgba(78,240,216,.04);border:1px solid rgba(78,240,216,.18);border-radius:4px;overflow:hidden;transition:border-color .15s,transform .18s}
.gearset-card:hover{border-color:rgba(78,240,216,.35);transform:translateY(-2px)}
.gearset-card-top{display:flex;align-items:center;gap:10px;padding:.75rem .875rem;border-bottom:1px solid rgba(78,240,216,.12)}
.gearset-icon{width:44px;height:44px;object-fit:contain;flex-shrink:0}
.gearset-icon-fallback{width:44px;height:44px;background:var(--div-surface2);border:1px solid var(--div-border2);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-hud);font-size:12px;font-weight:700;color:var(--div-text-dim);text-align:center;line-height:1.2;padding:2px}
.gearset-name{font-family:var(--font-hud);font-size:15px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;line-height:1.2;flex:1}
.gearset-type{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;line-height:1.5;white-space:nowrap}
.gtype-red{background:rgba(220,60,60,.12);color:#e04040;border:1px solid rgba(220,60,60,.22)}
.gtype-yellow{background:rgba(232,192,26,.1);color:#e8c01a;border:1px solid rgba(232,192,26,.2)}
.gtype-blue{background:rgba(100,160,210,.12);color:#7ab3d4;border:1px solid rgba(100,160,210,.2)}
.gearset-bonuses{padding:.625rem .875rem .75rem;display:flex;flex-direction:column;gap:4px}
.gearset-bonus{display:flex;align-items:flex-start;gap:8px}
.gpip{width:22px;height:18px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--font-hud);font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;line-height:1}
/* Neutral dark style for 2-piece and 3-piece pips — matches 4-piece */
.gpip.go2,.gpip.go3,.gpip.gs2,.gpip.gs3,.gpip.gd2,.gpip.gd3{background:#0d1219;color:var(--div-text);border:1px solid var(--div-border2)}
/* UPDATED: 4-piece pip with icon */
.gpip.g4-icon{background:rgba(78,240,216,.08);border:1px solid rgba(78,240,216,.3);width:22px;height:18px;padding:1px;display:flex;align-items:center;justify-content:center;overflow:hidden}
/* Kept for chest/bp */
.gpip.gchest{background:rgba(232,192,26,.1);color:#e8c01a;border:1px solid rgba(232,192,26,.2)}
.gpip.gbp{background:rgba(155,100,210,.12);color:#b47ad4;border:1px solid rgba(155,100,210,.22)}
.gearset-bonus-text{font-size:11px;font-weight:600;color:var(--div-text);line-height:1.45}
.gearset-talent-name{font-weight:700;color:#3abf5e}
.gearset-chest-label{font-weight:700;color:#e8c01a}
.gearset-bp-label{font-weight:700;color:#b47ad4}
.note{font-size:11px;font-weight:500;letter-spacing:.05em;color:var(--div-text-dim);margin-top:.875rem;font-style:italic}
/* Mobile responsive mission rows */
@media(max-width:600px){
.mrow-inner{flex-wrap:wrap}
.mrow-num{width:36px;min-height:auto;padding:.5rem 0}
.mrow-icon{width:40px;border-right:none}
.mrow-info{flex:1;border-right:none;padding:.5rem .75rem .25rem}
.mrow-name{font-size:14px;white-space:normal;overflow:visible;text-overflow:unset}
.mrow-loot{flex:1 0 100%;padding:.25rem .75rem .6rem;border-top:1px solid var(--div-border)}
.mrow-loot-item{font-size:16px;white-space:normal;overflow:visible;text-overflow:unset}
.topbar-titles h1{font-size:24px}
.timer-val{font-size:28px}
.weekly-pill{font-size:12px;padding:5px 10px}
.tabs{gap:2px}
.tab{font-size:11px;padding:7px 10px;letter-spacing:.08em}
}
</style>

async function loadFromDB(){try{var res=await sb().from('missions').select('*').order('slot');if(res.error)throw res.error;if(res.data&&res.data.length===5){missions=res.data;syncStatus='ok';}else{await seedDB();}}catch(e){console.error('Load:',e);syncStatus='error';}render();}
async function seedDB(){try{var res=await sb().from('missions').upsert(DEFAULT,{onConflict:'slot'});if(res.error)throw res.error;missions=DEFAULT.map(function(m){return Object.assign({},m);});syncStatus='ok';}catch(e){console.error('Seed:',e);syncStatus='error';}}
async function saveMission(i,name,dailyLoot){saveMsg[i]='saving';render();try{var row={slot:i+1,name:name,daily_loot:dailyLoot};var res=await sb().from('missions').upsert(row,{onConflict:'slot'});if(res.error)throw res.error;missions[i]=row;saveMsg[i]='saved';editing=null;render();setTimeout(function(){delete saveMsg[i];render();},2500);}catch(e){console.error('Save:',e);saveMsg[i]='error';render();}}
function getChicagoOffset(d){var utc=d.getTime();var chi=new Date(d.toLocaleString('en-US',{timeZone:'America/Chicago'})).getTime();return utc-chi;}
function getNext3amChicago(){var now=new Date();var off=getChicagoOffset(now);var chiNow=new Date(now.getTime()-off);var reset=new Date(chiNow);reset.setHours(3,0,0,0);if(chiNow>=reset)reset.setDate(reset.getDate()+1);return new Date(reset.getTime()+getChicagoOffset(reset));}
function getNextTuesday3amChicago(){var now=new Date();var off=getChicagoOffset(now);var chiNow=new Date(now.getTime()-off);var day=chiNow.getDay();var dtu=(2-day+7)%7;var reset=new Date(chiNow);reset.setDate(chiNow.getDate()+dtu);reset.setHours(3,0,0,0);if(dtu===0&&chiNow>=reset)reset.setDate(reset.getDate()+7);return new Date(reset.getTime()+getChicagoOffset(reset));}
function fmtHMS(ms){if(ms<=0)return'00:00:00';var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function fmtWeekly(ms){var d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000);return d>0?d+'d '+h+'h':h+'h';}
function colorizeBonusText(text){var blue=['Armor Regeneration','Total Armor','Armor on Kill','Armor Regen','Incoming Repairs','Extra Incoming Repairs','Hazard Protection','Explosive Resistance','Pulse Resistance','Shock Resistance','Health','Armor'];var red=['Shotgun Damage','Headshot Damage','Marksman Rifle Damage','Damage to Armor','Critical Hit Chance','Increased Threat','Pistol Damage','SMG Damage','Assault Rifle Damage','Reload Speed','Stability','Critical Hit Damage','Weapon Damage','Optimal Range','Swap Speed','LMG Damage','Rifle Damage','Weapon Handling','Ammo Capacity','Magazine Size','Accuracy','Damage to Health','Rate of Fire'];var yellow=['Repair Skills','Skill Repair','Skill Duration','Skill Haste','Skill Tier','Status Effects','Explosive Damage','Skill Health','Skill Efficiency','Skill Damage'];var all=[];blue.forEach(function(k){all.push({k:k,cls:'bk-blue'});});red.forEach(function(k){all.push({k:k,cls:'bk-red'});});yellow.forEach(function(k){all.push({k:k,cls:'bk-yellow'});});all.sort(function(a,b){return b.k.length-a.k.length;});var result=text;var placeholders={};var idx=0;all.forEach(function(item){var re=new RegExp(item.k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');result=result.replace(re,function(match){var ph='__PH'+(idx++)+'__';placeholders[ph]='<span class="'+item.cls+'">'+match+'</span>';return ph;});});Object.keys(placeholders).forEach(function(ph){result=result.replace(ph,placeholders[ph]);});return result;}

/* UPDATED: Helper to get type-based pip class for 2-piece and 3-piece */
function getGearPipClass(type,pieceNum){
  if(type==='red') return pieceNum===2?'go2':'go3';
  if(type==='yellow') return pieceNum===2?'gs2':'gs3';
  return pieceNum===2?'gd2':'gd3';
}

/* UPDATED: Build a single gear set card with type-colored pips and icon for 4-piece */
function buildGearsetCard(g){
  var url=GITHUB_GEARSETS+g.file+'.png';
  var initials=g.name.replace(/[^a-zA-Z ]/g,'').trim().split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();
  var typeLabel=g.type==='red'?'Offense':g.type==='yellow'?'Skill':'Defense';
  var typeCls=g.type==='red'?'gtype-red':g.type==='yellow'?'gtype-yellow':'gtype-blue';
  var p2cls=getGearPipClass(g.type,2);
  var p3cls=getGearPipClass(g.type,3);
  var talentName=g.b4.indexOf('\u2014')!==-1?g.b4.split('\u2014')[0].trim():g.b4.split('—')[0].trim();
  var talentDesc=g.b4.indexOf('\u2014')!==-1?g.b4.split('\u2014').slice(1).join('\u2014').trim():g.b4.split('—').slice(1).join('—').trim();
  return '<div class="gearset-card">'
    +'<div class="gearset-card-top">'
    +'<img class="gearset-icon" src="'+url+'" alt="'+g.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/>'
    +'<div class="gearset-icon-fallback" style="display:none">'+initials+'</div>'
    +'<div class="gearset-name">'+g.name+'</div>'
    +'<span class="gearset-type '+typeCls+'">'+typeLabel+'</span>'
    +'</div>'
    +'<div class="gearset-bonuses">'
    +'<div class="gearset-bonus"><div class="gpip '+p2cls+'">2</div><div class="gearset-bonus-text">'+g.b2+'</div></div>'
    +'<div class="gearset-bonus"><div class="gpip '+p3cls+'">3</div><div class="gearset-bonus-text">'+g.b3+'</div></div>'
    +'<div class="gearset-bonus">'
      +'<div class="gpip g4-icon"><img src="'+url+'" alt="" style="width:14px;height:14px;object-fit:contain;filter:drop-shadow(0 0 3px rgba(78,240,216,0.7))" onerror="this.parentNode.innerHTML=\'4\'"/></div>'
      +'<div class="gearset-bonus-text"><span class="gearset-talent-name">'+talentName+'</span>'+(talentDesc?' \u2014 '+talentDesc:'')+'</div>'
    +'</div>'
    +'<div class="gearset-bonus"><div class="gpip gchest"><img src="'+GITHUB_RAW+'chest.png" alt="Chest" style="width:14px;height:14px;object-fit:contain" onerror="this.parentNode.innerHTML=\'&#x25A1;\'"/></div><div class="gearset-bonus-text"><span class="gearset-chest-label">Chestpiece: </span>'+g.chest+'</div></div>'
    +'<div class="gearset-bonus"><div class="gpip gbp"><img src="'+GITHUB_RAW+'backpack.png" alt="Backpack" style="width:14px;height:14px;object-fit:contain" onerror="this.parentNode.innerHTML=\'&#x25C6;\'"/></div><div class="gearset-bonus-text"><span class="gearset-bp-label">Backpack: </span>'+g.bp+'</div></div>'
    +'</div>'
    +'</div>';
}

function renderGearsetGrid(){var filtered=GEARSETS.filter(function(g){return!gearsetSearch||g.name.toLowerCase().indexOf(gearsetSearch.toLowerCase())!==-1;});var grid=document.getElementById('gearset-grid');var count=document.getElementById('gearset-count');if(!grid)return;if(count)count.textContent=filtered.length+' / '+GEARSETS.length;var h='';filtered.forEach(function(g){h+=buildGearsetCard(g);});if(filtered.length===0)h='<p class="note" style="text-align:center;margin-top:2rem">No gear sets match your search.</p>';grid.innerHTML=h;}
function renderBrandGrid(){var filtered=BRANDS.filter(function(b){return !brandSearch||b.name.toLowerCase().indexOf(brandSearch.toLowerCase())!==-1;});var grid=document.getElementById('brand-grid');var count=document.getElementById('brand-count');if(!grid)return;var h='';filtered.forEach(function(b){var url=GITHUB_BRANDS+b.file+'.png';var initials=b.name.replace(/[^a-zA-Z ]/g,'').trim().split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();h+='<div class="brand-card"><div class="brand-card-top"><img class="brand-icon" src="'+url+'" alt="'+b.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><div class="brand-icon-fallback" style="display:none">'+initials+'</div><div class="brand-name">'+b.name+'</div></div><div class="brand-bonuses"><div class="brand-bonus"><div class="bonus-pip p1">1</div><div class="bonus-text">'+colorizeBonusText(b.b1)+'</div></div><div class="brand-bonus"><div class="bonus-pip p2">2</div><div class="bonus-text">'+colorizeBonusText(b.b2)+'</div></div><div class="brand-bonus"><div class="bonus-pip p3">3</div><div class="bonus-text">'+colorizeBonusText(b.b3)+'</div></div></div></div>';});if(filtered.length===0)h='<p class="note" style="text-align:center;margin-top:2rem">No brand sets match your search.</p>';grid.innerHTML=h;if(count)count.textContent=filtered.length+' / '+BRANDS.length;}

function render(){
  var now=new Date(),dailyMs=getNext3amChicago()-now,weeklyMs=getNextTuesday3amChicago()-now;
  var syncLabel=syncStatus==='loading'?'Connecting to database...':syncStatus==='ok'?'Live &mdash; Supabase connected':'Database error &mdash; check credentials in the HTML file';
  var dotCls=syncStatus==='loading'?'loading':syncStatus==='ok'?'ok':'err';
  var h='<div class="topbar"><div class="topbar-left"><img src="'+GITHUB_RAW+'Division2.png" alt="Division 2" style="width:57px;height:57px;max-width:57px;max-height:57px;object-fit:contain;display:block;flex-shrink:0"/><div class="topbar-titles"><h1>DIVISION 2</h1><p>Y8S1 Rise Up &nbsp;&middot;&nbsp; Cherry Blossom Event</p></div></div><div class="topbar-right"><div class="weekly-pill">Weekly reset &nbsp;<b>'+fmtWeekly(weeklyMs)+'</b></div><div class="timer-block"><div class="timer-label">Daily Loot Resets</div><div class="timer-val" id="dtimer">'+fmtHMS(dailyMs)+'</div></div></div></div><div class="sync-bar"><div class="sync-dot '+dotCls+'"></div>'+syncLabel+'</div><div class="tabs"><button class="tab'+(tab==='missions'?' on':'')+'" onclick="setTab(\'missions\')">Escalation</button><button class="tab'+(tab==='tiers'?' on':'')+'" onclick="setTab(\'tiers\')">Tiers &amp; Mutators</button><button class="tab'+(tab==='brands'?' on':'')+'" onclick="setTab(\'brands\')">Brand Sets</button><button class="tab'+(tab==='gearsets'?' on':'')+'" onclick="setTab(\'gearsets\')">Gear Sets</button></div>';
  if(tab==='missions'){
    h+='<div class="mission-list">';
    missions.forEach(function(m,i){var loc=ALL_LOCS.find(function(l){return l.name===m.name;})||{type:'mission',district:'Unknown'};var isSH=loc.type==='stronghold',isEdit=editing===i,isPw=awaitingPw===i,sm=saveMsg[i];h+='<div class="mrow '+(isSH?'stronghold-row':'mission-row')+'"><div class="mrow-inner"><div class="mrow-num">'+(i+1)+'</div><div class="mrow-icon">'+(isSH?strongholdSVG(36,'#4ef0d8'):hexSVG(26,'rgba(55,138,221,0.85)'))+'</div><div class="mrow-info"><div class="mrow-name">'+m.name+'</div><div class="mrow-badges"><span class="badge-type '+(isSH?'badge-stronghold':'badge-mission')+'">'+(isSH?'Stronghold':'Mission')+'</span><span class="badge-district">'+loc.district+'</span></div></div><div class="mrow-loot"><div class="mrow-loot-label">Today\'s Targeted Loot</div><div class="mrow-loot-item">'+(m.daily_loot||'&mdash;')+'</div>'+(sm?'<div class="save-msg '+sm+'">'+(sm==='saving'?'Saving...':sm==='saved'?'&#x2713; Saved':'&#x26A0; Save failed')+'</div>':'')+'<div class="mrow-loot-footer"><button class="btn-edit-sm'+(isEdit||isPw?' active':'')+'" onclick="tryEdit('+i+')">'+(isEdit?'&#x2715; Close':isPw?'&#x1F512; Unlock':'&#x1F512; Edit')+'</button></div></div></div>';if(isPw){h+='<div class="edit-area"><div class="pw-overlay"><h4>Admin Access Required</h4><div class="erow"><label>Password</label><input type="password" id="pw'+i+'" placeholder="Enter password" onkeydown="if(event.key===\'Enter\')checkPw('+i+')" />'+(pwError?'<div class="pw-error">Incorrect password &mdash; try again</div>':'')+'</div><div class="btn-row"><button class="bsave" onclick="checkPw('+i+')">Unlock</button><button class="bcancel" onclick="cancelEdit()">Cancel</button></div></div></div>';}if(isEdit){var opts=ALL_LOCS.map(function(l){return'<option value="'+l.name+'"'+(l.name===m.name?' selected':'')+'>'+l.name+' ('+(l.type==='stronghold'?'Stronghold':'Mission')+')</option>';}).join('');h+='<div class="edit-area"><div class="erow"><label>Mission / Stronghold</label><select id="en'+i+'">'+opts+'</select></div><div class="erow"><label>Today\'s Daily Targeted Loot</label><input id="edaily'+i+'" value="'+(m.daily_loot||'')+'" placeholder="Item name"/></div><div class="btn-row"><button class="bsave" onclick="doSave('+i+')">Save to Database</button><button class="bcancel" onclick="cancelEdit()">Cancel</button></div></div>';}h+='</div>';});
    h+='</div><p class="note">Saves go to Supabase instantly &mdash; all visitors see changes in real time &nbsp;&middot;&nbsp; Resets 3:00 AM CST &nbsp;&middot;&nbsp; Missions rotate Tuesday</p>';
  }
  if(tab==='tiers'){
    var sT=selectedTier!==null?TIERS[selectedTier]:null,aM=sT?sT.mut:[],eM=MUTATORS.filter(function(m){return!m.global;}),gM=MUTATORS.filter(function(m){return m.global;});
    h+='<div class="tier-layout"><div><div class="section-label">Select a Tier</div><div class="tier-thead"><span>Tier</span><span>Cost</span><span>Net</span><span>Drops</span></div><div class="tier-rows">';
    TIERS.forEach(function(t,i){var net=t.prof-t.cost,isSel=selectedTier===i,cs=t.cost===0?'<span style="color:#3abf5e;font-weight:700">Free</span>':t.cost+' tokens';h+='<div class="tier-row'+(isSel?' selected':'')+'" onclick="selectTier('+i+')"><span><span class="tr-badge '+t.cls+'">'+t.lb+'</span></span><span class="tr-cost">'+cs+'</span><span class="tr-net '+(net>=0?'gn':'rd')+'">'+(net>=0?'+':'')+net+'</span><span class="tr-drop-cell">'+(t.drop>0?'<span class="tr-proto">'+t.drop.toFixed(1)+'% Prototype</span><span class="tr-loot">'+t.tgt+'% Targeted Loot</span>':'<span style="color:#5a7a90;font-size:11px">&mdash;</span>')+'</span></div>';});
    h+='</div></div><div><div class="section-label">Active Mutators</div><div class="mut-panel">';
    if(selectedTier===null){h+='<div class="click-hint">&larr; Select a tier to see active mutators</div><div class="mut-section-hdr">Enemy Mutators</div><div class="mut-list">';eM.forEach(function(mu){h+='<div class="mut-item inactive"><div class="mut-item-name">'+mu.n+'</div><div class="mut-item-desc">'+mu.d+'</div><div class="mut-item-tier">'+mu.starts+'</div></div>';});h+='</div><div class="mut-section-hdr">Global Mutators</div><div class="mut-list">';gM.forEach(function(mu){h+='<div class="mut-item inactive"><div class="mut-item-name">'+mu.n+'</div><div class="mut-item-desc">'+mu.d+'</div><div class="mut-item-tier">'+mu.starts+'</div></div>';});h+='</div>';}
    else{h+='<div class="mut-panel-title">'+(sT.lb==='Free'?'Free Tier':sT.lb)+' &mdash; '+aM.length+' Active</div><div class="mut-panel-sub">'+(aM.length===0?'No mutators at this tier':'Highlighted mutators are live this run')+'</div><div class="mut-section-hdr">Enemy Mutators</div><div class="mut-list">';eM.forEach(function(mu){var a=aM.indexOf(mu.n)!==-1;h+='<div class="mut-item '+(a?'active':'inactive')+'"><div class="mut-item-name">'+mu.n+'</div><div class="mut-item-desc">'+mu.d+'</div><div class="mut-item-tier">'+mu.starts+'</div></div>';});h+='</div><div class="mut-section-hdr">Global Mutators</div><div class="mut-list">';gM.forEach(function(mu){var a=aM.indexOf(mu.n)!==-1;h+='<div class="mut-item '+(a?'active':'inactive')+'"><div class="mut-item-name">'+mu.n+'</div><div class="mut-item-desc">'+mu.d+'</div><div class="mut-item-tier">'+mu.starts+'</div></div>';});h+='</div>';}
    h+='</div></div></div><p class="note">Prototype % = per-enemy drop chance &nbsp;&middot;&nbsp; Targeted Loot % = loot allocation increase per tier</p>';
  }
  if(tab==='brands'){
    var filtered=BRANDS.filter(function(b){return !brandSearch||b.name.toLowerCase().indexOf(brandSearch.toLowerCase())!==-1;});
    h+='<div class="brand-search-wrap"><input class="brand-search" id="bsi" placeholder="Search brand sets..." value="'+brandSearch+'" oninput="brandSearch=this.value;renderBrandGrid()"/><span class="brand-count" id="brand-count">'+filtered.length+' / '+BRANDS.length+'</span></div><div class="brand-grid" id="brand-grid">';
    filtered.forEach(function(b){var url=GITHUB_BRANDS+b.file+'.png';var initials=b.name.replace(/[^a-zA-Z ]/g,'').trim().split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();h+='<div class="brand-card"><div class="brand-card-top"><img class="brand-icon" src="'+url+'" alt="'+b.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><div class="brand-icon-fallback" style="display:none">'+initials+'</div><div class="brand-name">'+b.name+'</div></div><div class="brand-bonuses"><div class="brand-bonus"><div class="bonus-pip p1">1</div><div class="bonus-text">'+colorizeBonusText(b.b1)+'</div></div><div class="brand-bonus"><div class="bonus-pip p2">2</div><div class="bonus-text">'+colorizeBonusText(b.b2)+'</div></div><div class="brand-bonus"><div class="bonus-pip p3">3</div><div class="bonus-text">'+colorizeBonusText(b.b3)+'</div></div></div></div>';});
    h+='</div>';
    if(filtered.length===0)h+='<p class="note" style="text-align:center;margin-top:2rem">No brand sets match your search.</p>';
  }
  if(tab==='gearsets'){
    var gsFilt=GEARSETS.filter(function(g){return!gearsetSearch||g.name.toLowerCase().indexOf(gearsetSearch.toLowerCase())!==-1;});
    h+='<div class="gearset-search-wrap"><input class="gearset-search" id="gssi" placeholder="Search gear sets..." value="'+gearsetSearch+'" oninput="gearsetSearch=this.value;renderGearsetGrid()"/><span class="gearset-count" id="gearset-count">'+gsFilt.length+' / '+GEARSETS.length+'</span></div>';
    h+='<div class="gearset-grid" id="gearset-grid">';
    gsFilt.forEach(function(g){h+=buildGearsetCard(g);});
    h+='</div>';
    if(gsFilt.length===0)h+='<p class="note" style="text-align:center;margin-top:2rem">No gear sets match your search.</p>';
  }
  document.getElementById('root').innerHTML=h;
  startTimer();
}
var timerRef=null;
function startTimer(){if(timerRef)clearInterval(timerRef);timerRef=setInterval(function(){var el=document.getElementById('dtimer');if(!el){clearInterval(timerRef);return;}el.textContent=fmtHMS(Math.max(0,getNext3amChicago()-new Date()));},1000);}
function setTab(t){tab=t;editing=null;awaitingPw=null;pwError=false;render();}
function selectTier(i){selectedTier=selectedTier===i?null:i;render();}
function setBrandSearch(v){brandSearch=v;renderBrandGrid();}
function tryEdit(i){if(editing===i){cancelEdit();return;}if(isAdmin){editing=i;awaitingPw=null;pwError=false;render();setTimeout(function(){var el=document.getElementById('en'+i);if(el)el.focus();},50);return;}awaitingPw=awaitingPw===i?null:i;editing=null;pwError=false;render();setTimeout(function(){var el=document.getElementById('pw'+i);if(el)el.focus();},50);}
function checkPw(i){var v=((document.getElementById('pw'+i)||{}).value||'').trim();if(v===ADMIN_PW){isAdmin=true;awaitingPw=null;editing=i;pwError=false;render();setTimeout(function(){var el=document.getElementById('en'+i);if(el)el.focus();},50);}else{pwError=true;render();setTimeout(function(){var el=document.getElementById('pw'+i);if(el)el.focus();},50);}}
function cancelEdit(){editing=null;awaitingPw=null;pwError=false;render();}
function doSave(i){var n=((document.getElementById('en'+i)||{}).value||'').trim(),dl=((document.getElementById('edaily'+i)||{}).value||'').trim();if(n)saveMission(i,n,dl||'—');}
render();loadFromDB();
</script>
